<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neuron</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#f7f6f3;color:#1a1a1a;font-family:'Georgia',serif;overflow:hidden}

  .app{display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto}

  header{
    padding:20px 24px 16px;
    border-bottom:1px solid #e8e4de;
    background:#f7f6f3;
  }
  .header-name{font-size:22px;font-weight:700;letter-spacing:-.01em;color:#1a1a1a}
  .header-sub{font-size:12px;color:#9a9080;margin-top:3px;font-family:'Courier New',monospace}

  #chat{
    flex:1;overflow-y:auto;padding:24px 20px 12px;
    display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth;
    background:#f7f6f3;
  }
  #chat::-webkit-scrollbar{width:3px}
  #chat::-webkit-scrollbar-thumb{background:#ddd8d0;border-radius:4px}

  .welcome{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;flex:1;gap:14px;text-align:center;padding:40px 24px;
  }
  .welcome-emoji{font-size:38px;margin-bottom:4px}
  .welcome h2{font-size:20px;font-weight:700;color:#1a1a1a}
  .welcome p{font-size:13px;color:#9a9080;max-width:280px;line-height:1.7}
  .tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
  .tag{
    background:#fff;border:1px solid #e8e4de;border-radius:100px;
    padding:7px 15px;font-size:12px;color:#6b6358;
    cursor:pointer;transition:all .2s;font-family:'Georgia',serif;
  }
  .tag:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

  .msg{display:flex;gap:10px;animation:fadeUp .25s ease}
  .msg.user{flex-direction:row-reverse}

  .avatar{
    width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  }
  .avatar.ai{background:#1a1a1a;color:#fff}
  .avatar.user{background:#e8e4de;color:#1a1a1a}

  .bubble{
    max-width:78%;padding:12px 15px;font-size:14px;
    line-height:1.75;word-break:break-word;white-space:pre-wrap;
  }
  .bubble.ai{
    background:#fff;border:1px solid #e8e4de;
    border-radius:4px 16px 16px 16px;color:#1a1a1a;
  }
  .bubble.user{
    background:#1a1a1a;color:#f7f6f3;
    border-radius:16px 4px 16px 16px;
  }

  .thinking-wrap{display:flex;gap:10px}
  .thinking-bub{
    background:#fff;border:1px solid #e8e4de;
    border-radius:4px 16px 16px 16px;
    padding:14px 18px;display:flex;gap:5px;align-items:center;
  }
  .thinking-bub span{
    width:5px;height:5px;border-radius:50%;background:#c0bab2;
    animation:think 1.2s infinite;display:inline-block;
  }
  .thinking-bub span:nth-child(2){animation-delay:.2s}
  .thinking-bub span:nth-child(3){animation-delay:.4s}

  footer{
    padding:12px 20px 20px;border-top:1px solid #e8e4de;background:#f7f6f3;
  }
  .input-row{
    display:flex;gap:8px;align-items:flex-end;
    background:#fff;border:1px solid #e0dbd4;
    border-radius:14px;padding:10px 12px;
    transition:border-color .2s,box-shadow .2s;
  }
  .input-row:focus-within{
    border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,0.06);
  }
  #msg-input{
    flex:1;background:transparent;border:none;outline:none;
    color:#1a1a1a;font-family:'Georgia',serif;font-size:14px;
    resize:none;max-height:140px;min-height:24px;line-height:1.6;padding:2px 0;
  }
  #msg-input::placeholder{color:#b0aa9f}

  #send-btn{
    width:34px;height:34px;border-radius:50%;border:none;
    background:#1a1a1a;color:#fff;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:transform .15s,background .2s;
  }
  #send-btn:hover{background:#333;transform:scale(1.06)}
  #send-btn:active{transform:scale(0.95)}
  #send-btn:disabled{background:#d0cbc4;cursor:not-allowed;transform:none}

  .footer-note{text-align:center;margin-top:9px;font-size:10px;color:#c0bab2;font-family:'Courier New',monospace}

  @keyframes think{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1.15)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-name">Neuron</div>
    <div class="header-sub">sempre aqui pra te ajudar</div>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">✦</div>
      <h2>Olá, como posso ajudar?</h2>
      <p>Pode perguntar qualquer coisa — estou aqui pra isso.</p>
      <div class="tags">
        <div class="tag" onclick="quickSend('O que você é?')">O que você é?</div>
        <div class="tag" onclick="quickSend('Me conta uma história')">Me conta uma história</div>
        <div class="tag" onclick="quickSend('Escreva um poema')">Escreva um poema</div>
        <div class="tag" onclick="quickSend('Como funciona a internet?')">Como funciona a internet?</div>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="msg-input" placeholder="Escreva algo..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="footer-note">Enter envia · Shift+Enter quebra linha</div>
  </footer>

</div>

<script>
const SYSTEM = `Você é uma IA chamada Neuron, gentil, inteligente e prestativa.
Responda sempre em português de forma natural, calorosa e direta.
Fale como uma pessoa real — sem exageros, sem ser robótico.
Pode falar sobre qualquer assunto.`;

let history = [];
let generating = false;
let welcome = document.getElementById('welcome');

const chat  = document.getElementById('chat');
const input = document.getElementById('msg-input');
const btn   = document.getElementById('send-btn');

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function removeWelcome() {
  if (welcome) { welcome.remove(); welcome = null; }
}

function addMsg(role, text) {
  removeWelcome();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? 'N' : 'U';

  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  bub.textContent = text;

  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
  removeWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'thinking-wrap';
  wrap.id = 'thinking';

  const av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = 'N';

  const bub = document.createElement('div');
  bub.className = 'thinking-bub';
  bub.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || generating) return;

  generating = true;
  input.value = '';
  input.style.height = 'auto';
  btn.disabled   = true;
  input.disabled = true;

  addMsg('user', text);
  const thinkEl = addThinking();

  const newHistory = [...history, { role: 'user', content: text }];

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: newHistory,
      }),
    });

    const data = await res.json();
    const reply = data?.content?.find(b => b.type === 'text')?.text || 'Não consegui responder agora.';

    thinkEl.remove();
    addMsg('ai', reply);

    history = [...newHistory, { role: 'assistant', content: reply }];
    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    thinkEl.remove();
    addMsg('ai', 'Algo deu errado, tenta de novo.');
  }

  generating = false;
  btn.disabled   = false;
  input.disabled = false;
  input.focus();
}

function quickSend(text) {
  if (generating) return;
  input.value = text;
  sendMessage();
}
</script>
</body>
</html>
